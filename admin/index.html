<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Felix Vincent — showcasing projects, skills, and tech work."
    />
    <meta name="theme-color" content="#25aff3" />
    <meta property="og:title" content="Felix Vincent | Portfolio" />
    <meta
      property="og:description"
      content="Explore my coding projects, UI designs, and technical experience."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Felix Vincent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Portfolio | Admin</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function () {
        try {
          const savedTheme = localStorage.getItem("theme");
          const prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;

          const theme =
            savedTheme === "light" || savedTheme === "dark"
              ? savedTheme
              : prefersDark
                ? "dark"
                : "light";

          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.classList.toggle("dark", theme === "dark");

          document.documentElement.setAttribute(
            "data-theme-source",
            savedTheme ? "saved" : "system",
          );
        } catch (e) {
          console.warn("Theme detection failed, using light theme");
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </body>
</html>
